name: Multi-Platform Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run Lint & Test
        run: |
          npm run lint || echo "No lint script"
          npm test || echo "No tests"

  build-android:
    needs: install-and-test
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Node Deps
        run: npm install
      - name: Grant Gradle permission
        run: chmod +x android/gradlew
      - name: Build Android Debug
        run: |
          cd android
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    needs: install-and-test
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Node Deps
        run: npm install
      - name: Check for Missing Fonts
        run: ls -R src/assets/fonts || echo "Fonts directory not found!"
      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
      - name: Build iOS
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme ShareGo \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: build/Build/Products/Debug-iphonesimulator/*.app

  create-release:
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Delete Old Release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        continue-on-error: true 
        with:
          tag_name: latest-build
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Fresh Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Build (Run #${{ github.run_number }})
          body: |
            ## Build Summary
            - **Platform:** ${{ github.event.inputs.platform }}
            - **Node Version:** 24
          draft: false
          prerelease: false
          files: |
            ./artifacts/android-debug-apk/*.apk
            ./artifacts/ios-debug-app/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
