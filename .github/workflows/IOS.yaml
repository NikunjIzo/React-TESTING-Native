name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # --- NEW: Run Tests First ---
      - name: Run Unit Tests
        run: npm test

      # --- NEW: Cache CocoaPods ---
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      
      - name: Install CocoaPods CLI
        run: sudo gem install cocoapods
      
      - name: Install CocoaPods
        run: |
          cd ios
          rm -f .xcode.env.local
          pod install --repo-update
      
      - name: Build iOS App
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
          -scheme CICDRNApp \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          clean build
          
      # --- NEW: Upload the Build ---
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: build/Build/Products/Debug-iphonesimulator/*.app
