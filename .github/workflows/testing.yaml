name: Test iOS Signing Assets

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  inspect-signing:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Xcodes
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Create Keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Import Main Certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > certificate.p12

          security import certificate.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

      - name: Import Share Certificate
        env:
          SHARE_CERT_BASE64: ${{ secrets.SHARE_CERT_BASE64 }}
          SHARE_CERT_PASSWORD: ${{ secrets.SHARE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$SHARE_CERT_BASE64" | base64 --decode > share.p12

          security import share.p12 \
            -k build.keychain \
            -P "$SHARE_CERT_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

      - name: Install Provisioning Profiles
        env:
          APP_PROFILE: ${{ secrets.COMMUNITY_DISTRIBUTION }}
          SHARE_PROFILE: ${{ secrets.SHARE_EXTENSION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          echo "$APP_PROFILE" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/community.mobileprovision

          echo "$SHARE_PROFILE" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/shareextension.mobileprovision

          echo "Installed Profiles:"
          ls -lah ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Show Signing Identities
        run: |
          echo "================================"
          echo "INSTALLED SIGNING IDENTITIES"
          echo "================================"

          security find-identity -v -p codesigning build.keychain

      - name: Show Certificate Details
        run: |
          echo "================================"
          echo "CERTIFICATE DETAILS"
          echo "================================"

          security find-certificate -a -Z

      - name: Inspect Provisioning Profiles
        run: |
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
          do
            echo ""
            echo "======================================"
            echo "FILE: $(basename "$profile")"
            echo "======================================"

            security cms -D -i "$profile" > profile.plist

            echo ""
            echo "PROFILE NAME"
            grep -A1 "<key>Name</key>" profile.plist || true

            echo ""
            echo "TEAM IDENTIFIER"
            grep -A5 "<key>TeamIdentifier</key>" profile.plist || true

            echo ""
            echo "APPLICATION IDENTIFIER"
            grep -A3 "application-identifier" profile.plist || true

            echo ""
            echo "EXPIRATION"
            grep -A1 "<key>ExpirationDate</key>" profile.plist || true
          done

      - name: Check Project Signing Settings
        run: |
          echo "================================"
          echo "CODE SIGN STYLE"
          echo "================================"

          grep -n "CODE_SIGN_STYLE" ios/community.xcodeproj/project.pbxproj || true

          echo ""
          echo "================================"
          echo "PROVISIONING PROFILE SPECIFIER"
          echo "================================"

          grep -n "PROVISIONING_PROFILE_SPECIFIER" ios/community.xcodeproj/project.pbxproj || true

      - name: Summary
        run: |
          echo ""
          echo "================================"
          echo "SIGNING TEST COMPLETE"
          echo "================================"
          echo "Review:"
          echo "1. Signing identities"
          echo "2. Profile names"
          echo "3. Bundle identifiers"
          echo "4. Team identifiers"
          echo "5. Expiration dates"
