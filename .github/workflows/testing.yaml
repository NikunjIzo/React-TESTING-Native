name: Test iOS Certificate

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  inspect-certificate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Xcodes
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Verify Xcode
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Decode P12 Certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > certificate.p12

          echo "✅ certificate.p12 created"
          ls -lh certificate.p12

      - name: Create Temporary Keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Inspect Share Certificate
        run: |
          echo "${{ secrets.SHARE_CERT_BASE64 }}" | base64 --decode > share.p12
      
          security import share.p12 \
            -k build.keychain \
            -P "${{ secrets.SHARE_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
    
          echo "===== CERTIFICATES ====="
          security find-identity -v -p codesigning build.keychain

      - name: Inspect Provisioning Profile
        run: |
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision > profile.plist
      
          echo "Profile Name:"
          grep -A1 "<key>Name</key>" profile.plist
      
          echo "Application Identifier:"
          grep -A2 "application-identifier" profile.plist

      - name: Import Certificate
        env:
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

      - name: Show Installed Signing Identities
        run: |
          echo "--------------------------------"
          echo "Installed Code Signing Identities"
          echo "--------------------------------"

          security find-identity -v -p codesigning

      - name: Export Certificate Details
        run: |
          echo "--------------------------------"
          echo "Certificate Details"
          echo "--------------------------------"

          CERT_HASH=$(security find-identity -v -p codesigning | head -1 | awk '{print $2}')

          if [ -z "$CERT_HASH" ]; then
            echo "❌ No signing certificate found"
            exit 1
          fi

          security find-certificate -Z -a | grep -A 20 "$CERT_HASH"

      - name: Determine Certificate Type
        run: |
          CERT_NAME=$(security find-identity -v -p codesigning | head -1)

          echo ""
          echo "Detected Identity:"
          echo "$CERT_NAME"
          echo ""

          if echo "$CERT_NAME" | grep -q "Apple Development"; then
            echo "🟡 This is a DEVELOPMENT certificate"
          elif echo "$CERT_NAME" | grep -q "Apple Distribution"; then
            echo "🟢 This is a DISTRIBUTION certificate"
          else
            echo "🔴 Unknown certificate type"
          fi
